# goreleaser config — see https://goreleaser.com
#
# Triggered by tag pushes (`v*`). The `release` workflow in
# `.github/workflows/release.yml` runs `goreleaser release --clean`,
# which builds the matrix below, packages tarballs, generates checksums,
# and creates a GitHub Release.
#
# To validate locally:
#   goreleaser check                       # config syntax
#   goreleaser build --snapshot --clean    # dry-run the build matrix

version: 2

project_name: pyry

before:
  hooks:
    - go mod tidy

builds:
  - id: pyry
    main: ./cmd/pyry
    binary: pyry
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}

archives:
  - id: pyry
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - docs/*.md
      - systemd/pyry.service
      - launchd/dev.pyrycode.pyry.plist

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^tests?:'
      - '^chore:'
      - '^ci:'
      - '^Merge'

release:
  github:
    owner: pyrycode
    name: pyrycode
  draft: false
  prerelease: auto
  mode: replace
  header: |
    See [docs/guide.md](https://github.com/pyrycode/pyrycode/blob/main/docs/guide.md) for the user guide and [docs/deployment.md](https://github.com/pyrycode/pyrycode/blob/main/docs/deployment.md) for service-mode setup.

# NOTE: `brews:` is deprecated in favor of `homebrew_casks:` per goreleaser's
# 2026 deprecation note, but the cask schema doesn't support the `install:`
# and `test:` blocks formulas use. Stay on `brews:` until pyry's CLI-binary
# use case maps cleanly to the cask model. See:
#   https://goreleaser.com/deprecations#brews
brews:
  - name: pyry
    repository:
      owner: pyrycode
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/pyrycode/pyrycode
    description: "Process supervisor for Claude Code"
    license: MIT
    install: |
      bin.install "pyry"
    test: |
      system "#{bin}/pyry", "version"
    caveats: |
      To run pyry as a long-lived daemon, see:
        https://github.com/pyrycode/pyrycode/blob/main/docs/deployment.md
