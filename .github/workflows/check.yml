name: check

# PR gate: the same checks `make check` runs locally — vet, race tests,
# staticcheck, and the substrate-guard (no claude-TUI literal may appear in
# pyrycode .go outside the allowlist). pyrycode had no pull-request gate before
# this; release.yml and self-check-daily.yml run only on tags / schedule.
# The live-claude e2e (make e2e-realclaude) is NOT on this path — it needs a
# real claude session and metered spend.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      # github.com/pyrycode/tui-driver is a private SIBLING repo; the default
      # GITHUB_TOKEN cannot read it (404). Use an operator repo-scope PAT so
      # `go mod download` (which runs git in the module cache, outside the
      # checked-out repo) can fetch it. GOPRIVATE keeps it off the public proxy /
      # sumdb. HOMEBREW_TAP_TOKEN is the existing repo PAT (release.yml uses it);
      # swap to a dedicated read-only secret if you prefer to decouple them.
      - name: Configure git + Go for the private tui-driver module
        run: |
          git config --global url."https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/pyrycode/*" >> "$GITHUB_ENV"
      - name: make check
        run: make check
