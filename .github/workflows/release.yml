name: release

# Triggered on `v*` tag pushes. Before goreleaser publishes binaries,
# the per-agent self-check (#375) is invoked via the reusable workflow
# at .github/workflows/self-check-daily.yml (#534). goreleaser declares
# `needs: self-check`, so a regression in the per-agent tool-allowlist
# contract fails closed: the tag remains in the repo, no GitHub Release
# is created, no binaries publish, no homebrew formula push fires.
# Recovery: delete the tag, fix the regression on main, retag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  self-check:
    # Per-agent self-check gate (#534). Invokes the same workflow body
    # that runs daily on cron, so the steps stay in sync across both
    # call sites. `secrets: inherit` passes ANTHROPIC_API_KEY (required
    # by the self-check) and DISCORD_WEBHOOK_URL (used by the
    # notify-failure job in the called workflow on failure).
    uses: ./.github/workflows/self-check-daily.yml
    secrets: inherit

  goreleaser:
    needs: self-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope for pushing the auto-generated formula
          # to pyrycode/homebrew-tap. Create as a repo secret on
          # pyrycode/pyrycode. See docs/release-tooling.md for setup.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
