name: e2e realclaude (nightly)

# Nightly run of the real-claude e2e suite (#362). The suite is tag-gated
# (`-tags e2e_realclaude`) and intentionally excluded from per-PR CI because
# it spawns the real `claude` CLI against the Anthropic API and consumes API
# credits on every run (#361). Without a scheduled run, an upstream `claude`
# binary regression would only surface at the next production dispatch; this
# workflow bounds detection to 24h.
#
# Operator prerequisite: `ANTHROPIC_API_KEY` must be set as a repo secret.
# Without it, the suite fails red with a clear test-output reason.
#
# Monitoring contract: failure surfaces via the workflow badge — same
# contract as `self-check-daily.yml` (#336). No auto-issue, no webhook. If
# badge-only proves insufficient in practice, follow up in a separate
# ticket rather than adding notification channels speculatively.
#
# Cost note: every run consumes API credits. Do not enable a more
# aggressive cadence without revisiting the cost/coverage tradeoff.

on:
  schedule:
    - cron: "0 4 * * *"     # 04:00 UTC daily — offset from self-check-daily.yml's 06:13 UTC.
  workflow_dispatch: {}     # manual trigger for validating the workflow itself

jobs:
  e2e-realclaude:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Install claude
        run: npm install -g @anthropic-ai/claude-code
      - name: Run e2e realclaude suite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make e2e-realclaude
