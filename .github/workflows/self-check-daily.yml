name: agent-run self-check (daily)

# Belt-and-suspenders safety net for the per-agent tool-allowlist
# contract (#375; supersedes #336): every day, build pyry, install
# claude, and verify that claude launched with `--allowed-tools "Read"
# --dangerously-skip-permissions` still refuses Bash, as observed in
# claude's stream-json stdout (no `tool_use` event with name=="Bash").
# A red badge on this workflow signals the per-agent security boundary
# the dispatcher relies on has regressed — investigate before trusting
# any new dispatcher run.
#
# The job exits 0 on PASS, non-zero on FAIL or inconclusive.
#
# Alerting contract (#533): on failure, this workflow posts to the
# operator's Discord channel via the `DISCORD_WEBHOOK_URL` repo secret.
# Operator action: investigate the linked run before trusting any new
# dispatcher activity. If the secret is unset, the notify-failure job
# logs a warning and exits 0 — the original red badge still fires.
#
# Triggers: daily cron (`schedule:`), manual (`workflow_dispatch:`), and
# release-tag pushes via the reusable-workflow `workflow_call:` entry
# point invoked from `.github/workflows/release.yml`. A failing run on
# any trigger surfaces via the Discord alert (`notify-failure` job, #533)
# AND, when invoked from `release.yml`, blocks the goreleaser job from
# publishing (#534).

on:
  schedule:
    - cron: "13 6 * * *"   # 06:13 UTC daily — off-peak; offset from main CI.
  workflow_dispatch: {}     # manual trigger for testing the workflow itself
  workflow_call: {}         # invoked from release.yml on v* tag pushes (#534)

jobs:
  self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Install claude
        run: npm install -g @anthropic-ai/claude-code
      - name: Build pyry
        run: go build -o pyry ./cmd/pyry
      - name: Run self-check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./pyry agent-run --self-check

  notify-failure:
    needs: self-check
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Post Discord alert
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL secret not set — alert suppressed"
            exit 0
          fi
          PAYLOAD="$(jq -n \
            --arg workflow "${WORKFLOW_NAME}" \
            --arg url "${RUN_URL}" \
            --arg sha "${SHA:0:12}" \
            --arg date "$(date -u +'%Y-%m-%d %H:%M UTC')" \
            '{content: "🚨 **\($workflow)** failed\nRun: <\($url)>\nCommit: `\($sha)`\nDate: \($date)\nInvestigate before trusting any new dispatcher activity."}')"
          curl --fail-with-body -sS \
            -H 'Content-Type: application/json' \
            -X POST \
            -d "${PAYLOAD}" \
            "${DISCORD_WEBHOOK_URL}"
