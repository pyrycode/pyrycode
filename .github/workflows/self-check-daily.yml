name: agent-run self-check (daily)

# Belt-and-suspenders safety net for the deny-default whitelist (#336):
# every day, build pyry, install claude, and verify that
# `permissions.defaultMode: "deny"` still enforces refusal of Bash in
# interactive mode. A red badge on this workflow signals the
# per-spawn security boundary has regressed — investigate before
# trusting any new dispatcher run.
#
# The job exits 0 on PASS, non-zero on FAIL or inconclusive. Operator
# monitors the badge; a stronger pager hookup is a follow-up if false-
# positive rate is acceptable.

on:
  schedule:
    - cron: "13 6 * * *"   # 06:13 UTC daily — off-peak; offset from main CI.
  workflow_dispatch: {}     # manual trigger for testing the workflow itself

jobs:
  self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Install claude
        run: npm install -g @anthropic-ai/claude-code
      - name: Build pyry
        run: go build -o pyry ./cmd/pyry
      - name: Run self-check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./pyry agent-run --self-check
